<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="description" content="Технические работы на сайте BABYGIRL_LNR">
<title>Технические работы | BABYGIRL_LNR</title>
<link href="https://cdn.jsdelivr.net/npm/fontsource-great-vibes@5.0.0/index.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/fontsource-montserrat@5.0.0/index.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/fontsource-playfair-display@5.0.0/index.css" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --primary: #e91e63;
    --primary-dark: #c2185b;
    --secondary: #9c27b0;
    --dark: #1a1a2e;
    --darker: #0f0f1a;
    --light: #ffffff;
    --gray: #6b7280;
    --gradient: linear-gradient(135deg, #e91e63 0%, #9c27b0 100%);
}
.video-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -3;
    pointer-events: none;
    transform: translateZ(0);
    will-change: transform;
    filter: brightness(1.15) contrast(1.1) saturate(1.1);
}
.video-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(15,15,26,0.35) 0%, rgba(26,26,46,0.3) 100%);
    z-index: -2;
    pointer-events: none;
}
@media (max-width: 768px) {
    .video-bg { filter: brightness(1.2) contrast(1.15); }
    .video-overlay { background: linear-gradient(135deg, rgba(15,15,26,0.25) 0%, rgba(26,26,46,0.2) 100%); }
}
@media (prefers-reduced-data: reduce) { .video-bg { display: none; } }
@supports (-webkit-touch-callout: none) { .video-bg { -webkit-transform: translateZ(0); transform: translateZ(0); } }
html { height: 100%; }
body {
    font-family: 'Montserrat', sans-serif;
    background: var(--darker);
    color: var(--light);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    line-height: 1.6;
}
.logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    margin-bottom: 40px;
}
.logo-animation-wrapper {
    display: flex;
    align-items: center;
    gap: 15px;
}
.heart-svg {
    width: 60px;
    height: 60px;
    position: relative;
    flex-shrink: 0;
    overflow: visible;
}
.heart-path {
    fill: none;
    stroke: url(#ribbonGradient);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 350;
    stroke-dashoffset: 0;
    animation: heartPulseFinal 2s ease-in-out infinite;
}
@keyframes heartPulseFinal {
    0%,100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(233,30,99,0.5)); }
    50% { transform: scale(1.05); filter: drop-shadow(0 0 15px rgba(233,30,99,0.8)); }
}
.logo-text {
    font-family: 'Great Vibes', cursive;
    font-size: 52px;
    font-weight: 400;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
}
.main-card {
    background: rgba(26,26,46,0.8);
    backdrop-filter: blur(10px);
    border-radius: 32px;
    padding: 50px 40px;
    text-align: center;
    max-width: 650px;
    width: 90%;
    margin: 20px auto;
    border: 1px solid rgba(233,30,99,0.3);
    box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    animation: fadeInUp 0.8s ease forwards;
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
.construction-icon {
    font-size: 80px;
    margin-bottom: 20px;
    display: inline-block;
    animation: float 3s ease-in-out infinite;
}
@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}
h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 64px;
    margin-bottom: 20px;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.message {
    font-size: 20px;
    color: var(--gray);
    margin-bottom: 30px;
    line-height: 1.5;
}
.btn {
    padding: 14px 32px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    border: none;
    background: var(--gradient);
    color: white;
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}
.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(233,30,99,0.5);
}
.footer {
    margin-top: 60px;
    text-align: center;
    padding: 20px;
    font-size: 14px;
    color: var(--gray);
    border-top: 1px solid rgba(255,255,255,0.05);
    width: 100%;
}
@media (max-width: 768px) {
    .logo-text { font-size: 32px; }
    .heart-svg { width: 45px; height: 45px; }
    h1 { font-size: 48px; }
    .message { font-size: 18px; }
    .main-card { padding: 30px 20px; }
}
</style>
</head>
<body>

<video id="bgVideo" class="video-bg" autoplay muted loop playsinline webkit-playsinline aria-hidden="true" preload="auto">
    <source src="video/bg.mp4" type="video/mp4">
</video>
<div class="video-overlay" aria-hidden="true"></div>

<svg style="position: absolute; width: 0; height: 0;">
    <defs>
        <linearGradient id="ribbonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e91e63"/>
            <stop offset="100%" stop-color="#9c27b0"/>
        </linearGradient>
    </defs>
</svg>

<div class="logo">
    <div class="logo-animation-wrapper">
        <svg viewBox="0 0 100 100" class="heart-svg" aria-hidden="true">
            <path class="heart-path" d="M50 88 C20 62 0 42 0 26 A16 16 0 0 1 26 10 C36 10 46 16 50 26 C54 16 64 10 74 10 A16 16 0 0 1 100 26 C100 42 80 62 50 88 Z" />
        </svg>
        <span class="logo-text">BABYGIRL_LNR</span>
    </div>
</div>

<div class="main-card">
    <div class="construction-icon">🚧🔧</div>
    <h1>Технические работы</h1>
    <p class="message">
        Сайт временно недоступен.<br>
        Мы проводим плановое обновление сервиса.<br>
        Приносим извинения за временные неудобства.
    </p>
    <button class="btn" onclick="location.reload()">🔄 Обновить страницу</button>
    <p style="margin-top: 20px; font-size: 14px; color: var(--gray);">Ориентировочное время завершения работ: через 2–3 часа</p>
</div>

<footer class="footer">
    <p>© 2026 BABYGIRL_LNR. Все права защищены.</p>
</footer>

<script>
    // Видео-фон с автовоспроизведением
    const video = document.getElementById('bgVideo');
    if(video) {
        const playPromise = video.play();
        if(playPromise !== undefined) {
            playPromise.catch(() => {
                const enableVideo = () => {
                    video.play().catch(()=>{});
                    document.removeEventListener('touchstart', enableVideo);
                    document.removeEventListener('click', enableVideo);
                };
                document.addEventListener('touchstart', enableVideo, { once: true, passive: true });
                document.addEventListener('click', enableVideo, { once: true });
            });
        }
    }
</script>
</body>
</html>
